services:
  mongo:
    image: mongo:7
    container_name: mongo-airports
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis-pop:
    image: redis:7
    container_name: redis-pop-airports
    ports:
      - "6379:6379"

  redis-geo:
    image: redis:7
    container_name: redis-geo-airports
    ports:
      - "6380:6379"

volumes:
  mongo_data: